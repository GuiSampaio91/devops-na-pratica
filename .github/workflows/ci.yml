name: CI - DevOps na Prática

# Pipeline de Integração Contínua disparado a cada push e Pull Request para a
# branch principal (e manualmente via workflow_dispatch). São quatro jobs:
# 'lint' e 'terraform-validate' começam em paralelo; 'test' roda após o 'lint';
# e 'build' é executado por último, dependendo de 'test' e 'terraform-validate'.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint:
    name: Análise estática (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala dependências de desenvolvimento
        run: pip install -r requirements-dev.txt

      - name: Executa flake8
        run: flake8 app tests

  test:
    name: Testes automatizados (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala dependências
        run: pip install -r requirements-dev.txt

      - name: Executa testes com cobertura
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Publica relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  terraform-validate:
    name: Valida Terraform (IaC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: terraform fmt (check)
        working-directory: ./infra
        run: terraform fmt -check -recursive

      - name: terraform init (sem backend)
        working-directory: ./infra
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ./infra
        run: terraform validate

  build:
    name: Build da imagem
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Empacota a aplicação
        run: |
          mkdir -p dist
          tar -czvf dist/todo-api-${{ github.sha }}.tar.gz \
            app requirements.txt

      - name: Publica artefato
        uses: actions/upload-artifact@v4
        with:
          name: todo-api-build
          path: dist/*.tar.gz
          retention-days: 7
