name: CI/CD - DevOps na Prática

# Pipeline de Integração e Entrega Contínua, disparado a cada push e Pull Request
# para a branch principal (e manualmente via workflow_dispatch).
#  - Integração Contínua: lint, test e terraform-validate (em paralelo no início).
#  - Segurança: scan de vulnerabilidades da imagem com Trivy.
#  - Entrega Contínua: build e publicação da imagem Docker no GitHub Container
#    Registry (ghcr.io), executada apenas em push na branch main.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint:
    name: Análise estática (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala dependências de desenvolvimento
        run: pip install -r requirements-dev.txt

      - name: Executa flake8
        run: flake8 app tests

  test:
    name: Testes automatizados (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala dependências
        run: pip install -r requirements-dev.txt

      - name: Executa testes com cobertura
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Publica relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  terraform-validate:
    name: Valida Terraform (IaC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: terraform fmt (check)
        working-directory: ./infra
        run: terraform fmt -check -recursive

      - name: terraform init (sem backend)
        working-directory: ./infra
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ./infra
        run: terraform validate

  security:
    name: Scan de segurança (Trivy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem para análise
        run: docker build -t todo-api:scan .

      - name: Scan de vulnerabilidades (CRITICAL e HIGH) com Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 \
            --format table todo-api:scan

  build:
    name: Empacota artefato (.tar.gz)
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Empacota a aplicação
        run: |
          mkdir -p dist
          tar -czvf dist/todo-api-${{ github.sha }}.tar.gz \
            app requirements.txt

      - name: Publica artefato
        uses: actions/upload-artifact@v4
        with:
          name: todo-api-build
          path: dist/*.tar.gz
          retention-days: 7

  docker:
    name: Build e publicação da imagem (CD)
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    # Só publica em push direto na branch main (não em Pull Requests)
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define metadados e tags da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
