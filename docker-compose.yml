# Sobe a API localmente a partir do build do Dockerfile.
# Uso: docker compose up --build
services:
  api:
    build: .
    image: todo-api:local
    container_name: todo-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
